name: e2e

permissions:
  contents: read
  checks: write

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: debian:trixie

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ hashFiles('.github/workflows/e2e.yml') }}

      - name: Install system dependencies
        run: apt-get update -qq && apt-get install -y -qq wget git sudo ca-certificates make xz-utils

      - name: Install mise
        run: wget -qO- https://mise.jdx.dev/install.sh | sh

      - name: Cache mise tools
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise
          key: mise-${{ hashFiles('.tool-versions') }}

      - name: Install tools (bats, chezmoi)
        run: |
          "$HOME/.local/bin/mise" install
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

      - name: Install chezmoi-recipes
        run: |
          wget -qO- "https://github.com/fgrehm/chezmoi-recipes/releases/latest/download/chezmoi-recipes_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin chezmoi-recipes

      - name: Unit tests (file deployment)
        run: make test-ci

      - name: E2E tests (tool installation)
        run: make test-e2e-ci

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Bats
          path: test-results/*.xml
          reporter: java-junit
